<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />

  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />
  <!-- WARNING: for iOS 7, remove the width=device-width and height=device-height attributes. See https://issues.apache.org/jira/browse/CB-4323 -->
  <!meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1, width=device-width, height=device-height, target-densitydpi=device-dpi" />
  <meta name="viewport" content="user-scalable=no, initial-scale=1, maximum-scale=1, minimum-scale=1" />
  <title>Mon guichet</title>
</head>
<body>
  <!-- the map -->
  <div id="map" class="needsclick"></div>
  <div id="selection" onclick="wapp.showSelect();" data-placeholder="Signaler !"></div>
  <i id="signaler" onclick="wapp.showReportForm();" class="fa fa-map-marker" title="Signaler..."></i>
  <i id="signalerGPS" onclick="wapp.directGPS();" class="fa fa-map-marker expert" title="Signaler GPS..."></i>

  <!-- info -->
  <div id="info" ></div>

  <!-- splash -->
  <div id="splash" data-role="page" class="visible">
    <img />
  </div>

  <!-- Menu -->
  <div data-role="menu" class="back" onclick="wapp.hideMenu();"></div>
  <div data-role="menu" data-template="principal"></div>

  <!-- Recherche par adresse -->
  <div id="search" data-role="page" data-direction="left" data-template="search"></div>

  <!-- Maps loader -->
  <div id="loadMap" data-role="page" data-direction="up" data-template="loadMap"></div>
  <div id="loadGuichet" data-role="page" data-direction="up" data-template="loadGuichet"></div>

  <!-- Add Extent -->
  <div id="cacheExtent" data-role="page" data-direction="up" data-template="cacheExtent"></div>

  <!-- Hors Ligne -->
  <div id="offline"- data-role="page" data-direction="up" data-template="offline"></div>

  <!-- A propos -->
  <div id="apropos" data-role="page" data-template="apropos"></div>

  <!-- Options -->
  <div id="options" data-role="page" data-template="options"></div>

  <!-- Maintenance -->
  <div id="maintenance" data-role="page" data-template="maintenance" data-onshow="wapp.maintenance()"></div>

  <!-- Couches -->
  <div id="couches" data-role="page" data-template="couches"></div>
  <div id="layer-guichet" data-role="page" data-template="layer-guichet"></div>
  <div id="layer-carte" data-role="page" data-template="layer-carte"></div>
  <div id="layer-geoportail" data-role="page" data-template="layer-geoportail"></div>
  <div id="layer-signalement" data-role="page" data-template="layer-signalement"></div>

<!-- Layers 
  <div id="layers" data-role="page" data-template="layers"></div>
-->

  <!-- Layers -->
  <div id="filter" data-role="page" data-template="filter"></div>
  
  <!-- Liste des groupes -->
  <div id="communities" data-role="page" data-template="communities"></div>

  <!-- Liste des conflits -->
  <div id="conflicts" data-role="page" data-template="conflicts"></div>

  <!-- Fiche -->
  <div id="fiche" data-role="page" data-template="fiche" data-direction="up"></div>

  <!-- Georem --
  <div id="georem" data-role="page" data-template="georem"></div>
  -->
  <!-- Signalements -->
  <div id="signalements" data-role="page" data-template="signalements"></div>

  <!-- Signalements GPS -->
  <div id="georemGPS" data-role="page" data-direction="up" data-template="georemGPS" class="car" ></div>

  <!-- Slider -->
  <div id="slider" data-role="page"></div>

  <script type="text/javascript" src="index.js" charset="UTF-8"></script>
</body>
</html>
