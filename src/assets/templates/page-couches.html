<div data-role="header" data-back-button="true">Mes couches</div>
<div data-role="content" class="couches">

  <div class="couche">
    <h2 onclick="wapp.showPage('layer-signalement');">
      <i class="fa fa-eye"></i> Signalements
    </h2>
    <div class="icn-bar">
      </i><i class="fa fa-filter fa-disable">
      </i><i class="fa fa-send" onclick="wapp.ripart.postLocalRems();">

      </i><i class="fa fa-gear" onclick="wapp.showPage('signalements');">

  <div class="couche guichet">
    <h2 onclick="wapp.showGuichet()">
      <i class="fa fa-eye"></i> Guichet <span class="name"></span>
    </h2>
    <div class="icn-bar">
      <i class="fa fa-search fa-disable">
      </i><i class="fa fa-cloud-download" onclick="wapp.loadCache();">
      </i><i class="fa fa-refresh" onclick="wapp.updateCache();">
        <div class="tag"><span></span></div>
      </i><i class="fa fa-gear" onclick="wapp.centerCache(); wapp.hidePage();">

      </i>
  </div></div>

  <div class="couche">
    <h2 onclick="wapp.showPage('layer-carte');">
      <i class="fa fa-eye"></i> Mes cartes
    </h2>
    <div class="icn-bar">
      <i class="fa fa-search fa-disable">
      </i><i class="fa fa-cloud-download">
      </i><i class="fa fa-gear fa-disable">
      </i><i class="fa fa-info-circle" onclick="wapp.showDialog('dialog-info-cartes');">
      </i>
  </div></div>
  
  <div class="couche">
    <h2 onclick="wapp.showPage('layer-geoportail');">
