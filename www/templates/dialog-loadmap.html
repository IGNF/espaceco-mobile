<!-- Dialogue pour le chargement de tuilles GPP -->
<div>
	<div data-input="select" data-param="layer">
		<label>Couche à charger </label>
		<div data-input-role="option" data-val="GEOGRAPHICALGRIDSYSTEMS.MAPS" data-default="true">Carte</div>
		<div data-input-role="option" data-val="ORTHOIMAGERY.ORTHOPHOTOS">Photographie aérienne</div>
		<div data-input-role="option" data-val="CADASTRALPARCELS.PARCELS">Parcelles cadastrales</div>
	</div>
	<div style="display:none;">
		Min : <img class="minimg" />
		<input type="number" class="min" value="15" />
		Max : <img class="maximg" />
		<input type="number" class="max" value="15" />
	</div>
	<ul>
		<li>
			Nombre de dalles à charger : <span class="length">...</span> fichiers.
		</li>
		<li>
			Taille estimée : <span class="size">...</span> Mo.
		</li>
		<li>
			Temps estimée : <span class="time">...</span> mn.
		</li>
	</ul>
</div>
