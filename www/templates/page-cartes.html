<div data-role="header" data-back-button="true">Mes cartes</div>
<div data-role="onglet">
	<div data-role="onglet-bt">
		<div data-list="guichets">
			<i class="fa fa-address-card"></i>Guichets
		</div><div data-list="maps">
			<i class="fa tools-layers"></i>Cartes
		</div>
	</div>

	<!-- Liste des guichets-->
	<div data-role="onglet-li" data-list="guichets">
		<ul>
			<li title="sdis86:hydrants_sdis86" onclick="wapp.setGuichet($(this).attr('title')); wapp.hidePage();">
				<i class="fa fa-address-card"></i>
				sdis86 : "Table des hydrants du SDIS de la Vienne" (Poitiers)
				<div data-input-role="info"></div>
			</li>
			<li title="demo_guichet:piste_cyclable" onclick="wapp.setGuichet($(this).attr('title')); wapp.hidePage();">
				<i class="fa fa-address-card"></i>
				Guichet des pistes cyclables (Saint-Mandé)
				<div data-input-role="info"></div>
			</li>
		</ul>
	</div>

	<!-- Liste des cartes-->
	<div data-role="onglet-li" data-list="maps">
		<button class="button big-button" style="float:right;" onclick="wapp.cache.getCacheDir()">Répertoire de sauvegarde (<span class="cacheroot"></span>)</button>
		<ul data-role="list">
			<li data-role="template">
				<i class="fa fa-map-o"></i>
				<input type="text" class="nom" placeholder="Nom de la carte" /><i class="clear-input"></i>
				<div class="menu">
					<i class="fa fa-map-o button"></i>
					<i class="fa tools-locate button"></i>
					<br />
					<i class="fa fa-refresh button"></i>
					<i class="fa fa-trash button"></i>
				</div>
				<div class="info">
					<span class="dalle">x</span> dalle(s) chargée(s) le <span class="date">01/01/2015</span>.
				</div>
			</li>
		</ul>
		<button class="button big-button addmap" style="float:right;">Ajouter une carte...</button>
	</div>
</div>
