<div class="noconnect">
	<p>
		Merci de vous connecter afin de faire un signalement.
		<br/>
		<i>
			Vous devez au préalable vous être inscrit sur
			<a href="https://qlf-collaboratif.ign.fr/collaboratif-develop/register/" target="_system">
				l'Espace Collaboratif</a>
			pour pouvoir effectuer une contribution.
		</i>
	</p>
	<input class="button big-button" type="button" value="Connexion" onclick="wapp.ripart.connectDialog()" />
</div>

<div class="connect profil">
	<span class="title"></span><img />
</div>

<div class="connect info">
	<p>

	</p>
	<div class="buttons" style=" text-align: center;">
		<button class="button big-button" onclick="wapp.ripart.showFormulaire();">Faire un signalement</button>
	</div>
</div>

<div class="connect formulaire">
	<ul class="default">
		<li class="position">
			<label>Position :</label> 
			<button class="movePosition button">
				<i class="fa fa-map-marker"></i>&nbsp; déplacer...
			</button>
			<p>
				<input type="text" class="lon" /> , <input type="text" class="lat" />
			</p>
		</li>

		<li data-input="select" data-param="theme">
			<label>Thème</label>
		</li>

		<li>
			Commentaire :
			<textarea class="comment"></textarea>
		</li>
		
		<li class="photo">
			<img onclick="wapp.ripart.photo();" />
			<span class="fa-stack fa-lg" style="background:#ddd; border-radius:50%;" onclick="wapp.ripart.photo();">
				<i class="fa fa-camera fa-stack-1x"></i>
			</span>
		</li>
	</ul>
	<div class="buttons">
		<div data-role="dialogBt" class="cancel" >Annuler</div>
		<div data-role="dialogBt" class="save" >Enregistrer</div>
	</div>
	<br/>
</div>
