xtTrackpauseTrackingquitEditionModeremoveUserLayerreportStylesaveConflictssavePositionsaveTrackingsetDeportshowConflictsshowFeatureshowFeatureInfoshowGeoremshowSlidershowWFSFeatureshowWMSFeaturestartDirectGPSstartTrackingstopTrackingtime Espace collaboratif mobile Le projet utilise le framework open-source Cordova développé par la Fondation Apache. Celui-ci permet de créer des applications pour différentes plateformes (Android, iOS, Windows mobile) en HTML, CSS et JavaScript. Application CordovApp Afin de simplifier l'utilisation de Cordova et d'unifier les développement, l'application utilise la base applicative CordovApp. × Search results Close Documentation generated by JSDoc 3.6.11 using the DocStrap template. "},"Dialog.html":{"id":"Dialog.html","title":"Class: Dialog","body":" Documentation Namespaces wapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes DialogEditionErrorEditonTools Global disableListeditionModeendTrackingfilterFeaturegetFeatureTitlegetPositiongetUserLayersinitDocumentForminitReportlayerReportnextTrackpauseTrackingquitEditionModeremoveUserLayerreportStylesaveConflictssavePositionsaveTrackingsetDeportshowConflictsshowFeatureshowFeatureInfoshowGeoremshowSlidershowWFSFeatureshowWMSFeaturestartDirectGPSstartTrackingstopTrackingtime Class: Dialog Dialog new Dialog() Dialogue de l'application. Classe utilisée en interne pour la création des dialogues de l'application. Utilisez la fonction CordovApp#dialog pour créer un dialogue. {@see module:CordovApp-Dialogues} × Search results Close Documentation generated by JSDoc 3.6.11 using the DocStrap template. "},"EditionError.html":{"id":"EditionError.html","title":"Class: EditionError","body":" Documentation Namespaces wapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes DialogEditionErrorEditonTools Global disableListeditionModeendTrackingfilterFeaturegetFeatureTitlegetPositiongetUserLayersinitDocumentForminitReportlayerReportnextTrackpauseTrackingquitEditionModeremoveUserLayerreportStylesaveConflictssavePositionsaveTrackingsetDeportshowConflictsshowFeatureshowFeatureInfoshowGeoremshowSlidershowWFSFeatureshowWMSFeaturestartDirectGPSstartTrackingstopTrackingtime Class: EditionError EditionError new EditionError(li, inline) Gestion des erreurs et contraintes de saisie Parameters: Name Type Description li Element element auquel ajouter l'icone d'erreur inline boolean show error inline Methods show() Afficher l'erreur dans un dialog × Search results Close Documentation generated by JSDoc 3.6.11 using the DocStrap template. "},"EditonTools.html":{"id":"EditonTools.html","title":"Class: EditonTools","body":" Documentation Namespaces wapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes DialogEditionErrorEditonTools Global disableListeditionModeendTrackingfilterFeaturegetFeatureTitlegetPositiongetUserLayersinitDocumentForminitReportlayerReportnextTrackpauseTrackingquitEditionModeremoveUserLayerreportStylesaveConflictssavePositionsaveTrackingsetDeportshowConflictsshowFeatureshowFeatureInfoshowGeoremshowSlidershowWFSFeatureshowWMSFeaturestartDirectGPSstartTrackingstopTrackingtime Class: EditonTools EditonTools A TouchCursor to select objects on hovering the cursor new EditonTools(options) Parameters: Name Type Description options Object Extends ol_Object Methods setLayer( [layer]) Set layer to edit Parameters: Name Type Argument Description layer CollabVector &lt;optional&gt; × Search results Close Documentation generated by JSDoc 3.6.11 using the DocStrap template. "},"module-CordovApp.html":{"id":"module-CordovApp.html","title":"Module: CordovApp","body":" Documentation Namespaces wapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes DialogEditionErrorEditonTools Global disableListeditionModeendTrackingfilterFeaturegetFeatureTitlegetPositiongetUserLayersinitDocumentForminitReportlayerReportnextTrackpauseTrackingquitEditionModeremoveUserLayerreportStylesaveConflictssavePositionsaveTrackingsetDeportshowConflictsshowFeatureshowFeatureInfoshowGeoremshowSlidershowWFSFeatureshowWMSFeaturestartDirectGPSstartTrackingstopTrackingtime Module: CordovApp Afin de simplifier l'utilisation de Cordova, un base applicative a été développée : CordovApp (dans le répertoire ./js/wapp de l'application). Le but est de simplifier et unifier l'initialisation des applications Cordova. Objet CordovApp L'objet CordovApp définit une application standard et prend en charge : l'initialisation de l'application la mise en pause ou la fermeture de l'application la gestion des bouton android (menu/backbutton) la sauvegarde des paramètres le chargement des pages et des templates ainsi que quelques fonctionnalités utiles (input clear, gestion du focus ). La première chose à faire est donc de créer une application et surcharger les fonctionnalités utiles (initialize, onMenuButton, pause, resume, quit). La fonction initialize est appelée lorsque le système est initialisé et l'application peut se lancer. var wapp = new CordovApp( { // Initilize the application map initialize: function() { // initialiser l'application } }); Fonctionnalités Outre la gestion du lancement de l'application, l'objet CordovApp permet également : la gestion de pages la gestion de dialogues et de notifications la gestion de l'aide en ligne une gestion avancée des paramètres de l'application × Search results Close Documentation generated by JSDoc 3.6.11 using the DocStrap template. "},"module-CordovApp-Dialogues.html":{"id":"module-CordovApp-Dialogues.html","title":"Module: CordovApp-Dialogues","body":" Documentation Namespaces wapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes DialogEditionErrorEditonTools Global disableListeditionModeendTrackingfilterFeaturegetFeatureTitlegetPositiongetUserLayersinitDocumentForminitReportlayerReportnextTrackpauseTrackingquitEditionModeremoveUserLayerreportStylesaveConflictssavePositionsaveTrackingsetDeportshowConflictsshowFeatureshowFeatureInfoshowGeoremshowSlidershowWFSFeatureshowWMSFeaturestartDirectGPSstartTrackingstopTrackingtime Module: CordovApp-Dialogues Fichier: ./js/wapp/cordovapp.dialog.js Gestion des dialogues L'objet CordovApp contient par défaut la possibilité d'afficher des dialogue dans l'application, notification et alertes. Affichage d'un dialogue La CordovApp a un objet CordovApp#dialog qui lui permet d'afficher un dialogue en lui fournissant le contenu du dialogue à afficher et des paramètres pour le personnaliser, à l'aide de la fontion Dialog.show. Le paramètre callback permet en particulier de récupérer les informations à la fermeture du dialogue. var wapp = new CordovApp(); wapp.dialog.show ( content, { title: \"Mon dialogue\", className: \"maclasse\", closeBox: true, buttons: { cancel:\"Annuler\", ok: \"\"}, callback: function(bt) { if (bt == \"ok\") { ... } } }); Le contenu peut être chargé via un template : var wapp = new CordovApp(); var content= CordovApp.template('dialog-mondialogue'); wapp.dialog.show ( content ); Le contenu peut être soit soit une chaine (contenant un code HTML valide) soit un objet jQuery. Dans ce cas, il est possible de connecter le contenu avant l'insertion dans le dialogue au travers des écouteurs jQuery. Les dialogues sont modaux et une div vient bloquer les interactions avec le fond. On ne peut afficher qu'un seul dialogue à la fois. Il est possible de savoir si un dialogue est ouvert (Dialog.isOpen) et on peut le fermer via la méthode Dialog.close. Si on ne fourni aucun argument à la fonction Dialog.show, le dernier dialogue est affiché. var wapp = new CordovApp(); // Afficher un dialogue wapp.dialog.show(\"test\"); // Verifier s'il est ouvert wapp.dialog.isOpen(); // Le fermer wapp.dialog.close(); L'application elle même peut savoir si un dialogue est ouvert ou fermer le dialogue courant (cette fonction gère également les dialogues spéciaux voir § suivant). var wapp = new CordovApp(); // Afficher un dialogue wapp.dialog.show(\"test\"); // Verifier si un dialogue est ouvert var b = wapp.hasDialog(); // Le fermer wapp.closeDialog(); Dialogues spéciaux Un certain nombre de dialogues spécifique sont disponible dans l'application. Ceux-ci vont s'afficher en superposition du dialogue standard. Les méthodes alert, message et prompt de l'application permettent d'afficher facilement une alerte, un message ou un prompt. Le paramètre callback permet de récupérer l'information demandée, dans le cas d'un message, on récupère le bouton comme pour un dialogue standard et dans le cas du prompt, on récupère l'information demandée. alert var wapp = new CordovApp(); // Afficher une alerte wapp.alert(\"Une erreur s'est produite...\"); prompt var wapp = new CordovApp(); // Demander une valeur wapp.prompt(\"Entrez une valeur\", 1, function(v){ console.log(\"La valeur est : \"+v); }); message var wapp = new CordovApp(); // Afficher un message wapp.message(\"Ceci est un message informatif...\", \"Message\", { ok:\"Compris\", cancel:\"Annuler\" }, function(b){ console.log(b); } ); selection La méthode selectDialog affiche un dialogue pour la saisie d'une valeur dans une liste. var wapp = new CordovApp(); // Demander une valeur dans une liste wapp.selectDialog ({ i1:\"Première valeur\", i2:\"Seconde valeur\" }, \"i2\", function(v){ console.log(\"La valeur est : \"+v); }, { title:\"Choissisez une valeur...\" }); Affiche une patience La méthode wait() permet d'afficher un message d'attente. Pour fermer la patience, il faut envoyer false comme argument. var wapp = new CordovApp(); // Attendre... wapp.wait(\"Merci de patienter...\"); Les notifications Il est également possible d'afficher des messages non bloquants via des notifications. Il faut préciser le message à afficher ainsi que la durée d'affiche sous la forme d'une nombre de milliseconde ou une chaine indiquant une valeur en seconde. var wapp = new CordovApp(); // Afficher une notification wapp.notification ('&lt;i style=\"color:yellow\"&gt;Hello !&lt;/i&gt;', \"2s\"); × Search results Close Documentation generated by JSDoc 3.6.11 using the DocStrap template. "},"module-CordovApp-Help.html":{"id":"module-CordovApp-Help.html","title":"Module: CordovApp-Help","body":" Documentation Namespaces wapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes DialogEditionErrorEditonTools Global disableListeditionModeendTrackingfilterFeaturegetFeatureTitlegetPositiongetUserLayersinitDocumentForminitReportlayerReportnextTrackpauseTrackingquitEditionModeremoveUserLayerreportStylesaveConflictssavePositionsaveTrackingsetDeportshowConflictsshowFeatureshowFeatureInfoshowGeoremshowSlidershowWFSFeatureshowWMSFeaturestartDirectGPSstartTrackingstopTrackingtime Module: CordovApp-Help Fichier: ./js/wapp/cordovapp.help.js Aide en ligne L'aide est une surcouche qui vient s'afficher en superposition de la page. L'aide ne s'affiche qu'une seule fois, il faut la réinitialiser si on veut pouvoir la rejouer. A chaque affichage de page, l'application cherche à afficher l'aide associée à cette page si elle existe dans le dossier ./help. Cette aide est un template qui doit se trouver dans le répertoire ./help de l'application avec pour nom l'identifiant de la page à afficher. Il est possible de contrôler l'aide via l'objet help de l'application. En particulier, on peut remettre l'aide à zéro (pour l'afficher une seconde fois). Afficher une aide spécifique, fermer l'aide courante ou passer à une étape suivante. L'aide est contenue dans l'élément #help de la page. L'étape correspond à une classe spécifique de ce bloc (.step_1 pour l'étape 1, .step_2 pour l'étape 2, etc.). Le programmeur est responsable de la façon dont l'aide se positionne et de la gestion des étapes dans le css. Au lancement d'une aide, celle-ci passe à l'étape 1. Il est donc possible de faire des animations entre les étapes directement via le css. var wapp = new CordovApp(); // Reinitialiser l'aide wapp.help.reset(); // Afficher l'aide du template help/aide.html wapp.help.show(\"aide\"); × Search results Close Documentation generated by JSDoc 3.6.11 using the DocStrap template. "},"module-CordovApp-Pages.html":{"id":"module-CordovApp-Pages.html","title":"Module: CordovApp-Pages","body":" Documentation Namespaces wapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes DialogEditionErrorEditonTools Global disableListeditionModeendTrackingfilterFeaturegetFeatureTitlegetPositiongetUserLayersinitDocumentForminitReportlayerReportnextTrackpauseTrackingquitEditionModeremoveUserLayerreportStylesaveConflictssavePositionsaveTrackingsetDeportshowConflictsshowFeatureshowFeatureInfoshowGeoremshowSlidershowWFSFeatureshowWMSFeaturestartDirectGPSstartTrackingstopTrackingtime Module: CordovApp-Pages Fichier: ./js/wapp/cordovapp.page.js Gestion des pages et templates Définition La gestion des pages et des templates est faite dans le fichier ./js/wapp/cordovapp.page.js. Il gère l'affichage des pages et du menu. La navigation dans l'application web se fait via des pages qui s'affichent au dessus de la carte. Généralement, une seule page est active à un moment donné, bien qu'il soit possible d'afficher plusieurs pages en même temps. Les pages sont définies via des blocs avec un role page dans la page de l'application (HMTL). L'identifiant de la div permet de gérer la page (affichage, fermeture, etc.). &lt;!-- A propos --&gt; &lt;div id=\"apropos\" data-role=\"page\"&gt;...&lt;/div&gt; &lt;!-- Options --&gt; &lt;div id=\"options\" data-role=\"page\"&gt;...&lt;/div&gt; L'affichage d'une page implique : la fermeture des autres pages / menu l'affichage de la page (ajout d'une classe visible + affichage de la div de la page) l'ajout d'un attribut data-page de valeur l'identifiant de la page sur le body (afin de gérer l'affichage des autres éléments de l'application) l'envoie d'un évènement 'showpage' avec l'information de la page affichée La fermeture d'une page implique : le masquage de la page (suppression de la classe visible + masquage de la div de la page) la suppression de l'attribut data-page sur le body l'envoie d'un évènement 'hidepage' avec l'information de la page fermée L'ajout/suppression de la classe visible à la page permet l'animation de la page via le CSS. S'il existe une animation standard, celle-ci reste surchargeable directement dans le CSS. Dans ce cas, le css donne la position de départ et la position d'arrivée correspond à la définition CSS avec la classe visible. Par défaut, la page s'affiche via un glissé depuis la droite sur le fond. data-direction permet de préciser la direction du glissé (up ou left). L'objet application a les méthodes pour les afficher/masquer (CordovApp#showPage, CordovApp#hidePage, CordovApp#togglePage) ou connaitre la page active (CordovApp#getPage). Définition des templates Afin de mieux séparer les pages dans le fichier principal de l'application (index.html), il est possible de les placer dans des templates en leur associant une donnée template. Les templates sont des fichiers html spérarés qui seront chargés et intégrés dans la page au lancement de l'application. &lt;!-- A propos --&gt; &lt;div id=\"apropos\" data-role=\"page\" data-template=\"apropos\"&gt;&lt;/div&gt; &lt;!-- Options --&gt; &lt;div id=\"options\" data-role=\"page\" data-template=\"options\"&gt;&lt;/div&gt; Les templates des pages sont dans le dossier /templates de l'application avec le nom page-nom.html où nom est le nom spécifié dans le fichier origine (templates/page-apropos.html pour la page a propose dans l'exemple ci-dessus). Les templates peuvent eux-même contenir des référence à des templates. Les templates peuvent être chargés indépendamment en utilisant la méthode static CordovApp.template. Par défaut, si aucun répertoire n'est précisé, le template charge le fichier dans le répertoire /templates de l'application. On peut changer ce comportement en précisant un répertoire. // Charger le fichier templates/exemple.html de l'application var temp1 = CordovApp.template('exemple'); // Charger le fichier dossier/exemple.html de l'application var temp2 = CordovApp.template('dossier/exemple'); Structure d'une page Il n'y a pas de structure imposée pour une page mais une structure générique est proposée pour les pages les plus courantes, comprenant un haut de page et un contenu. Le haut de page est définit par un role header avec une option back-button permettant d'ajouter une flèche de retour.Le contenu est défini par un role content. Un clic sur la flèche de retour exécutera la fonction pageBack de l'application (par défaut, cela fermera la page). &lt;div data-role=\"header\" data-back-button=\"true\"&gt;Ma page&lt;/div&gt; &lt;div data-role=\"content\"&gt; Mon contenu... &lt;/div&gt; Pour les pages plus élaborées il est possible d'afficher des onglets via un role onglet. Dans ce cas, la page est composée d'un bloc de boutons (data-role=\"onglet-bt\") qui contrôle l'affichage des onglets de la page et d'une liste d'onglets (data-role=\"onglet-li\"). La correspondance entre le bouton et son onglet est donnée par l'attribut data-list. Les onglets peuvent être défini dans la page elle même ou via un template. &lt;div data-role=\"header\" data-back-button=\"true\"&gt;Mon titre&lt;/div&gt; &lt;div data-role=\"onglet\"&gt; &lt;div data-role=\"onglet-bt\"&gt; &lt;div data-list=\"onglet1\"&gt; &lt;i class=\"fa fa-map-marker\"&gt;&lt;/i&gt;Premier &lt;/div&gt;&lt;div data-list=\"onglet2\"&gt; &lt;i class=\"fa tools-layers\"&gt;&lt;/i&gt;Second &lt;/div&gt; &lt;/div&gt; &lt;!-- Premier onglet --&gt; &lt;div data-role=\"onglet-li\" data-list=\"onglet1\"&gt; ... &lt;/div&gt; &lt;!-- Second onglet lu dans un template --&gt; &lt;div data-role=\"onglet-li\" data-list=\"onglet2\" data-template=\"onglet-onglet2\"&gt; &lt;/div&gt; &lt;/div&gt; Les onglets sont gérés comme les page et l'objet application a les méthodes pour les afficher (CordovApp#showonglet), les rendre actif (CordovApp#enableOnglet) ou vérifier celui qui est affiché (CordovApp#isOnglet). Affichage des pages Pour afficher une page il suffit d'appeler la fonction showPage avec l'identifiant de la page à afficher. Utiliser hidePage pour la masquer. var wapp = new CordovApp(); // Afficher la page \"search\" wapp.showPage(\"search\"); // Récuperer la page courante (renvoie \"search\") var p = wapp.getPage(); // Masquer la page courante wapp.hidePage(); // Afficher 2 pages en meme temps wapp.showPage(['page1','page2']); Il est possible de placer un écouteur pour réaliser une action lorsqu'une page est affichée ou fermée : $(\"#search\").on(\"showpage\", function(e) { // Faire quelque chose lorsque la page s'affiche }); $(\"#search\").on(\"hidepage\", function(e) { // Faire quelque chose lorsque la page s'affiche }); NB: Lorsqu'une page est affichée, l'attibut data-page est rempli avec l'identifiant de la page dans l'élément &lt;body&gt;. Cela peut être util pour gérer un affichage spécifique en fonction de la page affichée dans le CSS. /* Masquer la carte lorsque la page edition est affichee */ [data-page=\"edition\"] #map { display: none; } Gestion des onglets Les onglets s'affichent automatiquement lorsqu'ils sont sélectionnés. Il est également possible de les afficher programmatiquement via la méthode showOnglet, isOnglet indique si l'onglet est affiché ou non. var wapp = new CordovApp(); // Afficher l'onglet \"search\" wapp.showOnglet(\"search\"); // Vérifier que l'onglet \"search\" est affiche var b = wapp.isOnglet(\"search\") Il est possible de désactiver un onglet via la méthode CordovApp#enableOnglet : var wapp = new CordovApp(); // Desactiver l'onglet \"search\" wapp.enableOnglet(\"search\", false); Utilisation d'un menu Il est possible de définir un menu à l'application. Pour cela, il suffit de déclarer un élément avec un data-role=\"menu\". Si le contenu d'un menu est libre, le formatage par défaut utilise une liste (&lt;ul&gt;&lt;li&gt;). Le menu peut être contenu dans un template (menu-nom du template) du repertoire templates. &lt;div data-role=\"menu\" data-template=\"principal\"&gt;&lt;/div&gt; et dans ./templates/menu-principal.html: &lt;ul&gt; &lt;li class=\"search\" onclick='wapp.showPage(\"search\");'&gt; &lt;i class=\"fa fa-search\"&gt;&lt;/i&gt; Rechercher &lt;/li&gt; &lt;li onclick=\"wapp.showPage('apropos');\"&gt; &lt;i class=\"fa fa-info-circle\"&gt;&lt;/i&gt; A propos... &lt;/li&gt; &lt;/ul&gt; L'objet application a les méthodes pour gérer son affichage (showMenu, hideMenu, toggleMenu) ou savoir si le menu est affiché (isMenu). L'affichage du menu est géré de manière identique à celui d'une page et un évènement de type menu est envoyé avec un attribut show (boolean) indiquant si le menu est affiché ou non. $(document).on(\"menu\", function(e) { if (e.menu) console.log(\"Ouverture du menu\"); else console.log(\"Fermeture du menu\"); }); × Search results Close Documentation generated by JSDoc 3.6.11 using the DocStrap template. "},"module-CordovApp-Parametres.html":{"id":"module-CordovApp-Parametres.html","title":"Module: CordovApp-Parametres","body":" Documentation Namespaces wapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes DialogEditionErrorEditonTools Global disableListeditionModeendTrackingfilterFeaturegetFeatureTitlegetPositiongetUserLayersinitDocumentForminitReportlayerReportnextTrackpauseTrackingquitEditionModeremoveUserLayerreportStylesaveConflictssavePositionsaveTrackingsetDeportshowConflictsshowFeatureshowFeatureInfoshowGeoremshowSlidershowWFSFeatureshowWMSFeaturestartDirectGPSstartTrackingstopTrackingtime Module: CordovApp-Parametres Fichier: ./js/wapp/cordovapp.param.js Gestion et affichage de paramètres L'objet CordovApp contient des fonctionnalités évoluées pour la gestion des paramètre et leur affichage. Gestion des paramètres de l'application En standard, l'application gère, via le localStorage HTML5, la sauvegarde et la restauration des paramètres de l'application. Ceux-ci sont enregistrés dans WebApp@param du localStorage (via la fonctino CordovApp#saveParam) et sont stockées dans l'attribut param de l'application. Les paramètres sont automatiquement chargés au lancement de l'application et disponible dans le initialize de l'application. Le programmeur est responsable de leur enregistrement, en particulier, il peut être utile de les sauvegarder lorsque l'application quitte ou se met en pause (dans la méthode CordovApp#onQuit ou CordovApp#onPause). var wapp = new CordovApp(); // Modifier un parametre wapp.param.mon_option = 1; // Sauvegarder la modification pour la prochaine fois wapp.saveParam(); Lier un objet à un formulaire Il est possible de lier une liste de valeur à un formulaire via la méthode CordovApp#setParamInput de l'application. L'application va alors associer les blocs data-input correspondant au aux lignes de l'objet fourni afin de les afficher et de gérer leur modification. var wapp = new CordovApp(); var p = { name:\"sans nom\", zoombt:true, imgsize:\"petite\" }; // Lier au formulaire var pi = wapp.setParamInput($(\"#formulaire\"), p); Définition des inputs d'un formulaire Les input son des blocs HTML avec un paramètre data-input précisant leur type (text, check ou select). L'attribut data-param définit la clé correspondant à la ligne de l'objet fourni. Si aucun paramètre ne correspond à cette clé, celle-ci est ajoutée à l'objet. L'application va ensuite gérer l'affichage et la saisie de la valeur en fonction des informations fournies par le formulaire et du type d'input. L'attribut data-default indique la valeur par défaut du paramètre concerné. Les data-input type select doivent fournir un liste d'options (data-input-role=\"option\") avec une valeur (data-val). Les input de type custom ne sont pas traités par l'application et c'est au programmeur de gérer son comportement et la mise à jour de la valeur associée dans le formulaire (afficher un dialogue par exemple). input de type text &lt;ul&gt; &lt;li data-input=\"text\" data-param=\"name\" data-default=\"sans nom\"&gt; &lt;input type=\"text\"/&gt;&lt;i class=\"clear-input\"&gt;&lt;/i&gt; &lt;div data-input-role=\"info\"&gt;Entrez un nom.&lt;/div&gt; &lt;/li&gt; &lt;/ul&gt; input de type check &lt;ul&gt; &lt;li data-input=\"check\" data-param=\"zoombt\" data-default=\"true\" &gt; &lt;label&gt;Boutons de zoom &lt;/label&gt; &lt;div data-input-role=\"info\"&gt;Afficher les boutons de zoom sur la carte.&lt;/div&gt; &lt;/li&gt; &lt;/ul&gt; input de type select &lt;ul&gt; &lt;li data-input=\"select\" data-param=\"imgsize\"&gt; &lt;label&gt;Taille des images &lt;/label&gt; &lt;div data-input-role=\"option\" data-val=\"max\"&gt;Grande&lt;/div&gt; &lt;div data-input-role=\"option\" data-val=\"med\"&gt;Moyenne&lt;/div&gt; &lt;div data-input-role=\"option\" data-val=\"min\" data-default=\"true\"&gt;Petite&lt;/div&gt; &lt;/li&gt; &lt;/ul&gt; input de type custom &lt;ul&gt; &lt;li data-input=\"custom\" class=\"connect\" onclick=\"wapp.connect();\"&gt; &lt;label&gt;Identifiant de connexion &lt;/label&gt; &lt;div data-input-role=\"info\"&gt; &lt;span class=\"noinfo\"&gt;Vous n'êtes pas connecté.&lt;/span&gt; &lt;span class=\"info\"&gt;Vous êtes bien connecté.&lt;/span&gt; &lt;/div&gt; &lt;/li&gt; &lt;/ul&gt; Récupération des valeurs Les valeurs sont modifiées sur place (l'objet fourni est modifié). Il n'est donc pas forcément nécessaire de récupérer la mise à jour. Cependant, la méthode setParamInput renvoi un objet permettant de récupérer les valeurs (via getParams). De même si vous modifier la valeur d'un paramètre, la méthode change() de l'objet renvoyé permet de mettre à jour le formulaire. Le troisième argument de setParamInput est une fonction de rappel appelée à chaque modification d'une valeur et qui fourni l'information du paramètre modifié. Il est alors possible de gérer la modification de manière spécifique pour d'appliquer un contrôle de cohérence par exemple. × Search results Close Documentation generated by JSDoc 3.6.11 using the DocStrap template. "},"module-Ripart.html":{"id":"module-Ripart.html","title":"Module: Ripart","body":" Documentation Namespaces wapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes DialogEditionErrorEditonTools Global disableListeditionModeendTrackingfilterFeaturegetFeatureTitlegetPositiongetUserLayersinitDocumentForminitReportlayerReportnextTrackpauseTrackingquitEditionModeremoveUserLayerreportStylesaveConflictssavePositionsaveTrackingsetDeportshowConflictsshowFeatureshowFeatureInfoshowGeoremshowSlidershowWFSFeatureshowWMSFeaturestartDirectGPSstartTrackingstopTrackingtime Module: Ripart Fichier : ./js/ripart.js Accès au service de remontées d'information de l'espace collaboratif La classe RIPart permet d'accéder au service de remontées d'information de l'espace collaboratif. Elle utilise l'API de l'espace collaboratif. Organisation Le fichier .js/ripart.js définit la classe de base pour l'utilisation du service. La classe est étendue dans le fichier .js/wapp.ripart.js qui utilise les fonctinnalités de la CordovApp pour la gestion des remontées (dialogue de connexion, formulaires, etc.). Elle gère également un tableau de remontée local. Gestion de l'utilisateur Gestion des remontées × Search results Close Documentation generated by JSDoc 3.6.11 using the DocStrap template. "},"wapp.html":{"id":"wapp.html","title":"Namespace: wapp","body":" Documentation Namespaces wapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes DialogEditionErrorEditonTools Global disableListeditionModeendTrackingfilterFeaturegetFeatureTitlegetPositiongetUserLayersinitDocumentForminitReportlayerReportnextTrackpauseTrackingquitEditionModeremoveUserLayerreportStylesaveConflictssavePositionsaveTrackingsetDeportshowConflictsshowFeatureshowFeatureInfoshowGeoremshowSlide
