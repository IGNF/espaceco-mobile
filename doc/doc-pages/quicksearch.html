ction (message) Erreur param parametre de prise de vue Properties Name Type Description name string file name (&quot;TMP/img.jpg&quot; ou &quot;DIR/img.jpg&quot;) si null renvoie un fichier temporaire prompt string prompt pour le choix de la source buttons string list of buttons default {cancel:&quot;annuler&quot;} used if no source provided source enum Camera.PictureSourceType.SAVEDPHOTOALBUM ou Camera.PictureSourceType.CAMERA hasDialog() A dialog is open hideFullscreen() Remove fullscreen mode hideMenu() Hide the menu hidePage(id) Hide the page Parameters: Name Type Description id String | null of the page to hide, if null hide all pages initialize() Constructor: call when application is initilized isFullscreen() is in fullscreen mode isMenu() Is menu shown isNotification() Check if a notification is visible Returns: Type boolean isOnglet(the) Test if an onglet is shown Parameters: Name Type Description the String | jQuery list item isPage(id) Test if the page is on Parameters: Name Type Description id String of the page message(message, title, list, callback) Show a message Parameters: Name Type Description message String to alert title String for the dialod list Array.&lt;String&gt; of button labels callback function function with index of pressed button as argument notification(notification, duration, noreplace) Show a notification on the bottom of the screen Parameters: Name Type Description notification String duration Number | String (number in ms or a string &quot;1s&quot;/&quot;1000ms&quot;) before the notification vanish (0 close the notificatoin), default 3s noreplace boolean true to avaoid replacing existing notification, default false notinfo(title, msg, options) Show notification information on top of the screen Parameters: Name Type Description title String notification title msg String notification options className {string} CSS class name for the notification icon {html|undefined} onclose {function|undefined} callback function when notification is he [data-input=&quot;select&quot;] selected value Parameters: Name Type Description input selector a data-input=&quot;select&quot; with data-input-role=&quot;option&quot; Returns: the selected value Type String setParamInput(elt, param, onchange) Connect parameters to data-input div Parameters: Name Type Description elt object jQuery element that contains data-input param object objet with key corresponding to data-param onchange function a function that triggers change on params Returns: an object with a getParams() and a change() method to retrieve param and to reflect changes on values Type Object showMenu() Show the menu showOnglet(the) Show an onglet Parameters: Name Type Description the String | jQuery list item to show showPage(id) Show a page Parameters: Name Type Description id String | Array or array of ids of the page(s) to show timer(msg) Show a timer in the console between two calls Parameters: Name Type Description msg bool | string Message to log / true to start timer toggleMenu() Toggle menu visibility togglePage(id) Toggle page visibility Parameters: Name Type Description id String of the page to show/hide wait(message, false) Wait dialog Parameters: Name Type Description message String | false to show or false to hide the dialog false boolean to prevent animation (to chain dialogs) × Search results Close Documentation generated by JSDoc 3.5.5 using the DocStrap template. "},"CordovApp.File.html":{"id":"CordovApp.File.html","title":"Namespace: File","body":" Documentation Namespaces CordovApp.FileCordovApp.helpwapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes CordovAppDialogRIPart Namespace: File CordovApp. File A set of usefull function to handle files with Cordova.It wil solve the resolveLocalFileSystemURL for you. Methods &lt;static&gt; delFile(name, success, fail) Delete a file Parameters: Name Type Description name String URI referring to a local file to move to success function callback fail function callback invoked on error &lt;static&gt; dowloadFile(url, name, success, fail) Load a file from a remote adresse + save it to 'name' Parameters: Name Type Description url String URI referring to a remote file name String URI referring to a local file to move to success function callback fail function callback invoked on error &lt;static&gt; fileName(name) Get a name with no special chars Parameters: Name Type Description name string the name Returns: a new name with no special chars Type string &lt;static&gt; getApplicationDirectory(path, success, fail) Get the application directory for a path ie. Android/data// Parameters: Name Type Description path String URI referring to a local file or directory success function callback that is passed a DirectoryEntry corresponding to appdir for the filesystem fail function callback invoked on error &lt;static&gt; getDir(path, the) Get the file dir Parameters: Name Type Description path string the file fullname the string directory &lt;static&gt; getDirectory(path, success, fail, create) Get a directory Entry Parameters: Name Type Description path String URI referring to a local directory can start with SD|SDFILE|SDCACHE|ASSET|CACHE|FILE|APP to refer to cordova.file roots success function callback that is passed a DirectoryEntry objects fail function callback invoked on error create bool if true create the directory (only one level), default false &lt;static&gt; getExtension(path, string) Get the file extention Parameters: Name Type Description path string the file name string string after the last '.' (file extension) &lt;static&gt; getFile(name, success, fail) Get file information Parameters: Name Type Description name String URI referring to a local file to move to success function callback that is passed a FileEntry fail function callback invoked on error &lt;static&gt; getFileName(path, the) Get the file name Parameters: Name Type Description path string the file fullname the string file name &lt;static&gt; inf Search results Close Documentation generated by JSDoc 3.5.5 using the DocStrap template. "},"CordovApp.help.html":{"id":"CordovApp.help.html","title":"Namespace: help","body":" Documentation Namespaces CordovApp.FileCordovApp.helpwapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes CordovAppDialogRIPart Namespace: help CordovApp. help Methods &lt;static&gt; hideHelp() Hide help &lt;static&gt; nextHelp(n) Show next help page Parameters: Name Type Description n number next help &lt;static&gt; resetParam() Reset help &lt;static&gt; showHelp(name) Show help Parameters: Name Type Description name string template name (in ./help directory) × Search results Close Documentation generated by JSDoc 3.5.5 using the DocStrap template. "},"Dialog.html":{"id":"Dialog.html","title":"Class: Dialog","body":" Documentation Namespaces CordovApp.FileCordovApp.helpwapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes CordovAppDialogRIPart Class: Dialog Dialog new Dialog() Dialogue de l'application. Classe utilisée en interne pour la création des dialogues de l'application. Utilisez la fonction CordovApp#dialog pour créer un dialogue. {@see module:CordovApp-Dialogues} Methods &lt;static&gt; close() Close the dialog Returns: true if a dialog is closed Type bool &lt;static&gt; isOpen() A dialog is shown on the app Returns: true if a dialog is shown Type bool &lt;static&gt; show(content, options) Show a new dialog Parameters: Name Type Description content html a jQuery objet that contents the dialog options options Properties Name Type Description closeBox bool has a close box title string title of the dialog buttons Array.&lt;String&gt; list of button to show callback function callback function with index of pressed button as argument className String dialog class for css × Search results Close Documentation generated by JSDoc 3.5.5 using the DocStrap template. "},"module-CordovApp.html":{"id":"module-CordovApp.html","title":"Module: CordovApp","body":" Documentation Namespaces CordovApp.FileCordovApp.helpwapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes CordovAppDialogRIPart Module: CordovApp Afin de simplifier l'utilisation de Cordova, un base applicative a été développée : CordovApp (dans le répertoire ./js/wapp de l'application). Le but est de simplifier et unifier l'initialisation des applications Cordova. Objet CordovAppL'objet CordovApp définit une application standard et prend en charge : l'initialisation de l'application la mise en pause ou la fermeture de l'application la gestion des bouton android (menu/backbutton) la sauvegarde des paramètres le chargement des pages et des templates ainsi que quelques fonctionnalités utiles (input clear, gestion du focus ). La première chose à faire est donc de créer une application et surcharger les fonctionnalités utiles (initialize, onMenuButton, pause, resume, quit).La fonction initialize est appelée lorsque le système est initialisé et l'application peut se lancer. var wapp = new CordovApp( { // Initilize the application map initialize: function() { // initialiser l'application } });FonctionnalitésOutre la gestion du lancement de l'application, l'objet CordovApp permet également : la gestion de pages la gestion de dialogues et de notifications la gestion de l'aide en ligne une gestion avancée des paramètres de l'application × Search results Close Documentation generated by JSDoc 3.5.5 using the DocStrap template. "},"module-CordovApp-Dialogues.html":{"id":"module-CordovApp-Dialogues.html","title":"Module: CordovApp-Dialogues","body":" Documentation Namespaces CordovApp.FileCordovApp.helpwapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes CordovAppDialogRIPart Module: CordovApp-Dialogues Fichier: ./js/wapp/cordovapp.dialog.js Gestion des dialoguesL'objet CordovApp contient par défaut la possibilité d'afficher des dialogue dans l'application, notification et alertes. Affichage d'un dialogueLa CordovApp a un objet CordovApp#dialog qui lui permet d'afficher un dialogue en lui fournissant le contenu du dialogue à afficher et des paramètres pour le personnaliser, à l'aide de la fontion Dialog.show. Le paramètre callback permet en particulier de récupérer les informations à la fermeture du dialogue. var wapp = new CordovApp(); wapp.dialog.show ( content, { title: &quot;Mon dialogue&quot;, className: &quot;maclasse&quot;, closeBox: true, buttons: { cancel:&quot;Annuler&quot;, ok: &quot;&quot;}, callback: function(bt) { if (bt == &quot;ok&quot;) { ... } } });Le contenu peut être chargé via un template : var wapp = new CordovApp(); var content= CordovApp.template('dialog-mondialogue'); wapp.dialog.show ( content );Le contenu peut être soit soit une chaine (contenant un code HTML valide) soit un objet jQuery. Dans ce cas, il est possible de connecter le contenu avant l'insertion dans le dialogue au travers des écouteurs jQuery. Les dialogues sont modaux et une div vient bloquer les interactions avec le fond. On ne peut afficher qu'un seul dialogue à la fois.Il est possible de savoir si un dialogue est ouvert (Dialog.isOpen) et on peut le fermer via la méthode Dialog.close. Si on ne fourni aucun argument à la fonction Dialog.show, le dernier dialogue est affiché. var wapp = new CordovApp(); // Afficher un dialogue wapp.dialog.show(&quot;test&quot;); // Verifier s'il est ouvert wapp.dialog.isOpen(); // Le fermer wapp.dialog.close();L'application elle même peut savoir si un dialogue est ouvert ou fermer le dialogue courant (cette fonction gère également les dialogues spéciaux voir § suivant). var wapp = new CordovApp(); // Afficher un dialogue wapp.dialog.show(&quot;test&quot;); // Verifier si un dialogue est ouvert var b = wapp.hasDialog(); // Le fermer wapp.closeDialog();Dialogues spéciauxUn certain nombre de dialogues spécifique sont disponible dans l'application. Ceux-ci vont s'afficher en superposition du dialogue standard. Les méthodes alert, message et prompt de l'application permettent d'afficher facilement une alerte, un message ou un prompt. Le paramètre callback permet de récupérer l'information demandée, dans le cas d'un message, on récupère le bouton comme pour un dialogue standard et dans le cas du prompt, on récupère l'information demandée. alertvar wapp = new CordovApp(); // Afficher une alerte wapp.alert(&quot;Une erreur s'est produite...&quot;);promptvar wapp = new CordovApp(); // Demander une valeur wapp.prompt(&quot;Entrez une valeur&quot;, 1, function(v){ console.log(&quot;La valeur est : &quot;+v); });messagevar wapp = new CordovApp(); // Afficher un message wapp.message(&quot;Ceci est un message informatif...&quot;, &quot;Message&quot;, { ok:&quot;Compris&quot;, cancel:&quot;Annuler&quot; }, function(b){ console.log(b); } );selectionLa méthode selectDialog affiche un dialogue pour la saisie d'une valeur dans une liste. var wapp = new CordovApp(); // Demander une valeur dans une liste wapp.selectDialog ({ i1:&quot;Première valeur&quot;, i2:&quot;Seconde valeur&quot; }, &quot;i2&quot;, function(v){ console.log(&quot;La valeur est : &quot;+v); }, { title:&quot;Choissisez une valeur...&quot; });Affiche une patienceLa méthode wait() permet d'afficher un message d'attente. Pour fermer la patience, il faut envoyer false comme argument. var wapp = new CordovApp(); // Attendre... wapp.wait(&quot;Merci de patienter...&quot;);Les notificationsIl est également possible d'afficher des messages non bloquants via des notifications.Il faut préciser le message à afficher ainsi que la durée d'affiche sous la forme d'une nombre de milliseconde ou une chaine indiquant une valeur en seconde. var wapp = new CordovApp(); // Afficher une notification wapp.notification ('&lt;i style=&quot;color:yellow&quot;&gt;Hello !&lt;/i&gt;', &quot;2s&quot;); × Search results Close Documentation generated by JSDoc 3.5.5 using the DocStrap template. "},"module-CordovApp-Help.html":{"id":"module-CordovApp-Help.html","title":"Module: CordovApp-Help","body":" Documentation Namespaces CordovApp.FileCordovApp.helpwapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes CordovAppDialogRIPart Module: CordovApp-Help Fichier: ./js/wapp/cordovapp.help.js Aide en ligneL'aide est une surcouche qui vient s'afficher en superposition de la page. L'aide ne s'affiche qu'une seule fois, il faut la réinitialiser si on veut pouvoir la rejouer.A chaque affichage de page, l'application cherche à afficher l'aide associée à cette page si elle existe dans le dossier ./help. Cette aide est un template qui doit se trouver dans le répertoire ./help de l'application avec pour nom l'identifiant de la page à afficher. Il est possible de contrôler l'aide via l'objet help de l'application. En particulier, on peut remettre l'aide à zéro (pour l'afficher une seconde fois). Afficher une aide spécifique, fermer l'aide courante ou passer à une étape suivante. L'aide est contenue dans l'élément #help de la page.L'étape correspond à une classe spécifique de ce bloc (.step_1 pour l'étape 1, .step_2 pour l'étape 2, etc.). Le programmeur est responsable de la façon dont l'aide se positionne et de la gestion des étapes dans le css. Au lancement d'une aide, celle-ci passe à l'étape 1.Il est donc possible de faire des animations entre les étapes directement via le css. var wapp = new CordovApp(); // Reinitialiser l'aide wapp.help.reset(); // Afficher l'aide du template help/aide.html wapp.help.show(&quot;aide&quot;); × Search results Close Documentation generated by JSDoc 3.5.5 using the DocStrap template. "},"module-CordovApp-Pages.html":{"id":"module-CordovApp-Pages.html","title":"Module: CordovApp-Pages","body":" Documentation Namespaces CordovApp.FileCordovApp.helpwapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes CordovAppDialogRIPart Module: CordovApp-Pages Fichier: ./js/wapp/cordovapp.page.js Gestion des pages et templatesDéfinitionLa gestion des pages et des templates est faite dans le fichier ./js/wapp/cordovapp.page.js.Il gère l'affichage des pages et du menu. La navigation dans l'application web se fait via des pages qui s'affichent au dessus de la carte. Généralement, une seule page est active en même, bien qu'il soit possible d'afficher plusieurs pages en même temps. Les pages sont définies via des blocs avec un role 'page' dans la page de l'application (HMTL). L'identifiant de la div permet de gérer la page (affichage, fermeture, etc.). &lt;!-- A propos --&gt; &lt;div id=&quot;apropos&quot; data-role=&quot;page&quot;&gt;...&lt;/div&gt; &lt;!-- Options --&gt; &lt;div id=&quot;options&quot; data-role=&quot;page&quot;&gt;...&lt;/div&gt;L'affichage d'une page implique : la fermeture des autres pages / menu l'affichage de la page (ajout d'une classe visible + affichage de la div de la page) l'ajout d'un attribut data-page de valeur l'identifiant de la page sur le body (afin de gérer l'affichage des autres éléments de l'application) l'envoie d'un évènement 'showpage' avec l'information de la page affichée La fermeture d'une page implique : le masquage de la page (suppression de la classe visible + masquage de la div de la page) la suppression de l'attribut data-page sur le body l'envoie d'un évènement 'hidepage' avec l'information de la page fermée L'ajout/suppression de la classe visible à la page permet l'animation de la page via le CSS. S'il existe une animation standard, celle-ci reste surchargeable directement dans le CSS. Dans ce cas, le css donne la position de départ et la position d'arrivée correspond à la définition CSS avec la classe visible.Par défaut, la page s'affiche via un glissé depuis la droite sur le fond. data-direction permet de préciser la direction du glissé (up ou left). L'objet application a les méthodes pour les afficher/masquer (CordovApp#showPage, CordovApp#hidePage, CordovApp#togglePage) ou connaitre la page active (CordovApp#getPage). Définition des templatesAfin de mieux séparer les pages dans le fichier principal de l'application (index.html), il est possible de les placer dans des templates en leur associant une donnée template. Les templates sont des fichiers html spérarés qui seront chargés et intégrés dans la page au lancement de l'application. &lt;!-- A propos --&gt; &lt;div id=&quot;apropos&quot; data-role=&quot;page&quot; data-template=&quot;apropos&quot;&gt;&lt;/div&gt; &lt;!-- Options --&gt; &lt;div id=&quot;options&quot; data-role=&quot;page&quot; data-template=&quot;options&quot;&gt;&lt;/div&gt;Les templates des pages sont dans le dossier /templates de l'application avec le nom page-nom.html où nom est le nom spécifié dans le fichier origine (templates/page-apropos.html pour la page a propose dans l'exemple ci-dessus). Les templates peuvent eux-même contenir des référence à des templates. Les templates peuvent être chargés indépendamment en utilisant la méthode static CordovApp.template. Par défaut, si aucun répertoire n'est précisé, le template charge le fichier dans le répertoire /templates de l'application. On peut changer ce comportement en précisant un répertoire. // Charger le fichier templates/exemple.html de l'application var temp1 = CordovApp.template('exemple'); // Charger le fichier dossier/exemple.html de l'application var temp2 = CordovApp.template('dossier/exemple');Structure d'une pageIl n'y a pas de structure imposée pour une page mais une structure générique est proposée pour les pages les plus courantes, comprenant un haut de page et un contenu.Le haut de page est définit par un role header avec une option back-button permettant d'ajouter une flèche de retour.Le contenu est défini par un role content. Un clic sur la flèche de retour exécutera la fonction pageBack de l'application (par défaut, cela fermera la page). &lt;div data-role=&quot;header&quot; data-back-button=&quot;true&quot;&gt;Ma page&lt;/div&gt; &lt;div data-role=&quot;content&quot;&gt; Mon contenu... &lt;/div&gt;Pour les pages plus élaborées il est possible d'afficher des onglets via un role onglet. Dans ce cas, la page est composée d'un bloc de boutons (data-role=&quot;onglet-bt&quot;) qui contrôle l'affichage des onglets de la page et d'une liste d'onglets (data-role=&quot;onglet-li&quot;). La correspondance entre le bouton et son onglet est donnée par l'attribut data-list. Les onglets peuvent être défini dans la page elle même ou via un template. &lt;div data-role=&quot;header&quot; data-back-button=&quot;true&quot;&gt;Mon titre&lt;/div&gt; &lt;div data-role=&quot;onglet&quot;&gt; &lt;div data-role=&quot;onglet-bt&quot;&gt; &lt;div data-list=&quot;onglet1&quot;&gt; &lt;i class=&quot;fa fa-map-marker&quot;&gt;&lt;/i&gt;Premier &lt;/div&gt;&lt;div data-list=&quot;onglet2&quot;&gt; &lt;i class=&quot;fa tools-layers&quot;&gt;&lt;/i&gt;Second &lt;/div&gt; &lt;/div&gt; &lt;!-- Premier onglet --&gt; &lt;div data-role=&quot;onglet-li&quot; data-list=&quot;onglet1&quot;&gt; ... &lt;/div&gt; &lt;!-- Second onglet lu dans un template --&gt; &lt;div data-role=&quot;onglet-li&quot; data-list=&quot;onglet2&quot; data-template=&quot;onglet-onglet2&quot;&gt; &lt;/div&gt; &lt;/div&gt;Les onglets sont gérés comme les page et l'objet application a les méthodes pour les afficher (CordovApp#showonglet), les rendre actif (CordovApp#enableOnglet) ou vérifier celui qui est affiché (CordovApp#isOnglet). Affichage des pagesPour afficher une page il suffit d'appeler la fonction showPage avec l'identifiant de la page à afficher. Utiliser hidePage pour la masquer. var wapp = new CordovApp(); // Afficher la page &quot;search&quot; wapp.showPage(&quot;search&quot;); // Récuperer la page courante (renvoie &quot;search&quot;) var p = wapp.getPage(); // Masquer la page courante wapp.hidePage(); // Afficher 2 pages en meme temps wapp.showPage(['page1','page2']);Il est possible de placer un écouteur pour réaliser une action lorsqu'une page est affichée ou fermée : $(&quot;#search&quot;).on(&quot;showpage&quot;, function(e) { // Faire quelque chose lorsque la page s'affiche }); $(&quot;#search&quot;).on(&quot;hidepage&quot;, function(e) { // Faire quelque chose lorsque la page s'affiche });NB: Lorsqu'une page est affichée, l'attibut data-page est rempli avec l'identifiant de la page dans l'élément &lt;body&gt;. Gestion des ongletsLes onglets s'affichent automatiquement lorsqu'ils sont sélectionnés. Il est également possible de les afficher programmatiquement via la méthode CordovApp#showOnglet, CordovApp#isOnglet indique si l'onglet est affiché ou non. var wapp = new CordovApp(); // Afficher l'onglet &quot;search&quot; wapp.showOnglet(&quot;search&quot;); // Vérifier que l'onglet &quot;search&quot; est affiche var b = wapp.isOnglet(&quot;search&quot;)Il est possible de désactiver un onglet via la méthode CordovApp#enableOnglet : var wapp = new CordovApp(); // Desactiver l'onglet &quot;search&quot; wapp.enableOnglet(&quot;search&quot;, false);Utilisation d'un menuIl est possible de définir un menu à l'application. &lt;div data-role=&quot;menu&quot; data-template=&quot;principal&quot;&gt;&lt;/div&gt;L'objet application a les méthodes pour l'afficher/masquer (CordovApp#showMenu, CordovApp#hideMenu, CordovApp#toggleMenu) ou savoir si le menu est affiché (CordovApp#isMenu).L'affichage du menu est géré de manière identique à celui d'une page et un évènement de type menu est envoyé avec un attribut show (booléen) indiquant si le menu est affiché ou non.Si le contenu d'un menu est libre, le formatage par défaut utilise une liste (&lt;ul&gt;&lt;li&gt;). Utilisez les métodes CordovApp#showMenu, CordovApp#hideMenu et CordovApp#toggleMenu pour afficher ou masquer le menu.Lors de l'affichage ou du masquage du menu, un évènement menu est envoyé au document, avec un attribut show (true/false) indiquant l'état du menu. × Search results Close Documentation generated by JSDoc 3.5.5 using the DocStrap template. "},"module-CordovApp-Parametres.html":{"id":"module-CordovApp-Parametres.html","title":"Module: CordovApp-Parametres","body":" Documentation Namespaces CordovApp.FileCordovApp.helpwapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes CordovAppDialogRIPart Module: CordovApp-Parametres Fichier: ./js/wapp/cordovapp.param.js Gestion et affichage de paramètresL'objet CordovApp contient des fonctionnalités évoluées pour la gestion des paramètre et leur affichage. Gestion des paramètres de l'applicationEn standard, l'application gère, via le localStorage HTML5, la sauvegarde et la restauration des paramètres de l'application. Ceux-ci sont enregistrés dans WebApp@param du localStorage (via la fonctino CordovApp#saveParam) et sont stockées dans l'attribut param de l'application. Les paramètres sont automatiquement chargés au lancement de l'application et disponible dans le initialize de l'application. Le programmeur est responsable de leur enregistrement, en particulier, il peut être utile de les sauvegarder lorsque l'application quitte ou se met en pause (dans la méthode CordovApp#onQuit ou CordovApp#onPause). var wapp = new CordovApp(); // Modifier un parametre wapp.param.mon_option = 1; // Sauvegarder la modification pour la prochaine fois wapp.saveParam();Lier un objet à un formulaireIl est possible de lier une liste de valeur à un formulaire via la méthode CordovApp#setParamInput de l'application. L'application va alors associer les blocs data-input correspondant au aux lignes de l'objet fourni afin de les afficher et de gérer leur modification. var wapp = new CordovApp(); var p = { name:&quot;sans nom&quot;, zoombt:true, imgsize:&quot;petite&quot; }; // Lier au formulaire var pi = wapp.setParamInput($(&quot;#formulaire&quot;), p);Définition des inputs d'un formulaireLes input son des blocs HTML avec un paramètre data-input précisant leur type (text, check ou select). L'attribut data-param définit la clé correspondant à la ligne de l'objet fourni. Si aucun paramètre ne correspond à cette clé, celle-ci est ajoutée à l'objet.L'application va ensuite gérer l'affichage et la saisie de la valeur en fonction des informations fournies par le formulaire et du type d'input.L'attribut data-default indique la valeur par défaut du paramètre concerné.Les data-input type select doivent fournir un liste d'options (data-input-role=&quot;option&quot;) avec une valeur (data-val).Les input de type custom ne sont pas traités par l'application et c'est au programmeur de gérer son comportement et la mise à jour de la valeur associée dans le formulaire (afficher un dialogue par exemple). input de type text&lt;ul&gt; &lt;li data-input=&quot;text&quot; data-param=&quot;name&quot; data-default=&quot;sans nom&quot;&gt; &lt;input type=&quot;text&quot;/&gt;&lt;i class=&quot;clear-input&quot;&gt;&lt;/i&gt; &lt;div data-input-role=&quot;info&quot;&gt;Entrez un nom.&lt;/div&gt; &lt;/li&gt; &lt;/ul&gt;input de type check&lt;ul&gt; &lt;li data-input=&quot;check&quot; data-param=&quot;zoombt&quot; data-default=&quot;true&quot; &gt; &lt;label&gt;Boutons de zoom &lt;/label&gt; &lt;div data-input-role=&quot;info&quot;&gt;Afficher les boutons de zoom sur la carte.&lt;/div&gt; &lt;/li&gt; &lt;/ul&gt;input de type select&lt;ul&gt; &lt;li data-input=&quot;select&quot; data-param=&quot;imgsize&quot;&gt; &lt;label&gt;Taille des images &lt;/label&gt; &lt;div data-input-role=&quot;option&quot; data-val=&quot;max&quot;&gt;Grande&lt;/div&gt; &lt;div data-input-role=&quot;option&quot; data-val=&quot;med&quot;&gt;Moyenne&lt;/div&gt; &lt;div data-input-role=&quot;option&quot; data-val=&quot;min&quot; data-default=&quot;true&quot;&gt;Petite&lt;/div&gt; &lt;/li&gt; &lt;/ul&gt;input de type custom&lt;ul&gt; &lt;li data-input=&quot;custom&quot; class=&quot;connect&quot; onclick=&quot;wapp.connect();&quot;&gt; &lt;label&gt;Identifiant de connexion &lt;/label&gt; &lt;div data-input-role=&quot;info&quot;&gt; &lt;span class=&quot;noinfo&quot;&gt;Vous n'êtes pas connecté.&lt;/span&gt; &lt;span class=&quot;info&quot;&gt;Vous êtes bien connecté.&lt;/span&gt; &lt;/div&gt; &lt;/li&gt; &lt;/ul&gt;Récupération des valeursLes valeurs sont modifiées sur place (l'objet fourni est modifié). Il n'est donc pas forcément nécessaire de récupérer la mise à jour. Cependant, la méthode setParamInput renvoi un objet permettant de récupérer les valeurs (via getParams). De même si vous modifier la valeur d'un paramètre, la méthode change() de l'objet renvoyé permet de mettre à jour le formulaire. Le troisième argument de setParamInput est une fonction de rappel appelée à chaque modification d'une valeur et qui fourni l'information du paramètre modifié. Il est alors possible de gérer la modification de manière spécifique pour d'appliquer un contrôle de cohérence par exemple. × Search results Close Documentation generated by JSDoc 3.5.5 using the DocStrap template. "},"module-Ripart.html":{"id":"module-Ripart.html","title":"Module: Ripart","body":" Documentation Namespaces CordovApp.FileCordovApp.helpwapp Modules CordovAppCordovApp-DialoguesCordovApp-HelpCordovApp-PagesCordovApp-ParametresRipart Classes CordovAppDialogRIPart Module: Ripart Fichier : ./js/ripart.js Accès au service de remontées d'information de l'espace collaboratif La classe RIPart permet d'accéder au service de remontées d'information de l'espace collaboratif.Elle utilise l'API de l'espace collaboratif. Organisation Le fichier .js/ripart.js définit la classe de base pour l'utilisation du service. La classe est étendue dans le fichier .js/wapp.ripart.js qui utilise les fonctinnalités de la CordovApp pour la gestion des remontées (dialogue de connexion, formulaires, etc.).Elle gère également un tableau de remontée local. Gestion de l'utilisateurGestion des remontées × Search results Close Documentation generated by JSDoc 3.5.5 using the DocStrap template. "},"RIPart.html":{"id":"RIPart.html","title":"Class: RIPart","body":" Documentation Namespaces CordovApp.
